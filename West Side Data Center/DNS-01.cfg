! Command: show running-config
! device: DNS-01 (vEOS-lab, EOS-4.34.6M)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$vIVWaFAwuNl0Sn3q$krPseqSsELzdlHp7X3fMqQtoLTlRUgbHZAdTWEwMDSDqFOk3iKC3g2j/6BofhI9CV706VkKTr7GSst9.trUH21
username ansible_user privilege 15 role network-admin secret sha512 $6$Z7ijUy.7VBurvJUG$1lHlqtcwbySxz51AhbrUUv0pOVFLjt3bHAx8dKHd/mTrFTlWWGTqnU1kg/tGtaedzuqaffdcKHdrgM3mZqi5x.
